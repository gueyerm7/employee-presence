services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: employee_presence
      POSTGRES_USER: employee
      POSTGRES_PASSWORD: employee_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    depends_on:
      db:
        condition: service_started
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: employee_presence
      DB_USERNAME: employee
      DB_PASSWORD: employee_secret
      APP_ENV: local
      APP_DEBUG: "true"
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certs:/certs
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
